<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagina statica su Vercel</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #0f172a, #1e3a5f);
        color: #f8fafc;
      }
      main {
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        margin-bottom: 0.5rem;
      }
      p {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ciao da Vercel</h1>
      <p>Pagina HTML statica deployata via Cursor.</p>
    </main>
  </body>
</html>
